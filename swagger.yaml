openapi: "3.0.3"
info:
  title: API Amonet - Gestión de Productos Cosméticos
  description: |
    API RESTful para la gestión de productos cosméticos, marcas,
    materias primas y variables globales de fórmula.
  version: "1.0.0"

servers:
  - url: http://localhost:8000/api
    description: Servidor de desarrollo local

paths:
  /marcas:
    get:
      summary: Listar marcas
      description: Obtiene todas las marcas registradas en el sistema.
      operationId: listarMarcas
      tags:
        - Marcas
      responses:
        "200":
          description: Lista de marcas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Marca"

    post:
      summary: Crear marca
      description: Registra una nueva marca en el sistema.
      operationId: crearMarca
      tags:
        - Marcas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarcaCrear"
      responses:
        "201":
          description: Marca creada exitosamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Marca"
        "409":
          description: El nombre de la marca ya existe (case-insensitive)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "El nombre de la marca ya existe"

  /marcas/{marca_id}:
    get:
      summary: Obtener marca
      description: Obtiene los detalles de una marca específica por su ID.
      operationId: obtenerMarca
      tags:
        - Marcas
      parameters:
        - $ref: "#/components/parameters/MarcaId"
      responses:
        "200":
          description: Marca encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Marca"
        "404":
          description: Marca no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      summary: Actualizar marca
      description: Actualiza los datos de una marca existente.
      operationId: actualizarMarca
      tags:
        - Marcas
      parameters:
        - $ref: "#/components/parameters/MarcaId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarcaCrear"
      responses:
        "200":
          description: Marca actualizada exitosamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Marca"
        "404":
          description: Marca no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: El nombre de la marca ya está en uso por otra marca
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      summary: Eliminar marca
      description: |
        Elimina una marca del sistema.
        No se puede eliminar si tiene productos asociados.
      operationId: eliminarMarca
      tags:
        - Marcas
      parameters:
        - $ref: "#/components/parameters/MarcaId"
      responses:
        "204":
          description: Marca eliminada exitosamente
        "404":
          description: Marca no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: La marca tiene productos asociados y no puede ser eliminada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "La marca tiene 3 productos asociados. Elimine o reassigne los productos antes de eliminar la marca."

  /materias_primas:
    get:
      summary: Listar materias primas
      description: Obtiene todas las materias primas registradas.
      operationId: listarMateriasPrimas
      tags:
        - Materias Primas
      responses:
        "200":
          description: Lista de materias primas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MateriaPrima"

    post:
      summary: Crear materia prima
      description: Registra una nueva materia prima en el sistema.
      operationId: crearMateriaPrima
      tags:
        - Materias Primas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MateriaPrimaCrear"
      responses:
        "201":
          description: Materia prima creada exitosamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MateriaPrima"
        "409":
          description: El nombre de la materia prima ya existe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /materias_primas/{materia_prima_id}:
    get:
      summary: Obtener materia prima
      description: Obtiene los detalles de una materia prima específica.
      operationId: obtenerMateriaPrima
      tags:
        - Materias Primas
      parameters:
        - $ref: "#/components/parameters/MateriaPrimaId"
      responses:
        "200":
          description: Materia prima encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MateriaPrima"
        "404":
          description: Materia prima no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      summary: Actualizar materia prima
      description: Actualiza los datos de una materia prima existente.
      operationId: actualizarMateriaPrima
      tags:
        - Materias Primas
      parameters:
        - $ref: "#/components/parameters/MateriaPrimaId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MateriaPrimaCrear"
      responses:
        "200":
          description: Materia prima actualizada exitosamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MateriaPrima"
        "404":
          description: Materia prima no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: El nombre de la materia prima ya está en uso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      summary: Eliminar materia prima
      description: |
        Elimina una materia prima del sistema.
        No se puede eliminar si está siendo usada en algún producto.
      operationId: eliminarMateriaPrima
      tags:
        - Materias Primas
      parameters:
        - $ref: "#/components/parameters/MateriaPrimaId"
      responses:
        "204":
          description: Materia prima eliminada exitosamente
        "404":
          description: Materia prima no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: La materia prima está siendo usada en uno o más productos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "La materia prima está asignada a 2 productos. Elimine o actualice los productos antes de eliminar la materia prima."

  /variables_producto:
    get:
      summary: Listar variables de producto
      description: Obtiene todas las variables globales disponibles para fórmulas.
      operationId: listarVariablesProducto
      tags:
        - Variables de Producto
      responses:
        "200":
          description: Lista de variables globales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VariableProducto"

    post:
      summary: Crear variable de producto
      description: |
        Registra una nueva variable global para usar en fórmulas.
        El nombre debe ser un identificador válido (solo letras, números y guiones bajos).
      operationId: crearVariableProducto
      tags:
        - Variables de Producto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VariableProductoCrear"
      responses:
        "201":
          description: Variable creada exitosamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VariableProducto"
        "400":
          description: El nombre no es un identificador válido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: El nombre de la variable ya existe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /variables_producto/{variable_producto_id}:
    get:
      summary: Obtener variable de producto
      description: Obtiene los detalles de una variable global específica.
      operationId: obtenerVariableProducto
      tags:
        - Variables de Producto
      parameters:
        - $ref: "#/components/parameters/VariableProductoId"
      responses:
        "200":
          description: Variable encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VariableProducto"
        "404":
          description: Variable no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      summary: Actualizar variable de producto
      description: Actualiza los datos de una variable global existente.
      operationId: actualizarVariableProducto
      tags:
        - Variables de Producto
      parameters:
        - $ref: "#/components/parameters/VariableProductoId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VariableProductoCrear"
      responses:
        "200":
          description: Variable actualizada exitosamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VariableProducto"
        "404":
          description: Variable no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: El nombre de la variable ya está en uso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      summary: Eliminar variable de producto
      description: |
        Elimina una variable global del sistema.
        No se puede eliminar si está siendo referenciada en alguna fórmula activa.
      operationId: eliminarVariableProducto
      tags:
        - Variables de Producto
      parameters:
        - $ref: "#/components/parameters/VariableProductoId"
      responses:
        "204":
          description: Variable eliminada exitosamente
        "404":
          description: Variable no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: La variable está siendo referenciada en una o más fórmulas de productos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "La variable está siendo referenciada en 4 fórmulas de productos activos"

  /productos:
    get:
      summary: Listar productos
      description: |
        Obtiene todos los productos registrados.
        Incluye el nombre de la marca y la cantidad de materias primas en la respuesta.
      operationId: listarProductos
      tags:
        - Productos
      responses:
        "200":
          description: Lista de productos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductoLista"

    post:
      summary: Crear producto
      description: |
        Registra un nuevo producto con sus materias primas y fórmulas asociadas.
        Valida que la marca exista, que no se dupliquen materias primas
        y que las fórmulas sean expresiones matemáticas válidas.
      operationId: crearProducto
      tags:
        - Productos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductoCrear"
      responses:
        "201":
          description: Producto creado exitosamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Producto"
        "400":
          description: Error de validación en los datos del producto
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidacionErrores"
              example:
                errores:
                  name: "El nombre es requerido"
                  brandId: "La marca no existe"
                  rawMaterials: "Al menos una materia prima es requerida"
                  "rawMaterials.0.formula": "Expresión matemática inválida"

  /productos/{producto_id}:
    get:
      summary: Obtener producto
      description: Obtiene los detalles completos de un producto.
      operationId: obtenerProducto
      tags:
        - Productos
      parameters:
        - $ref: "#/components/parameters/ProductoId"
      responses:
        "200":
          description: Producto encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductoDetalle"
        "404":
          description: Producto no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      summary: Actualizar producto
      description: |
        Actualiza los datos de un producto existente,
        incluyendo su lista completa de materias primas.
      operationId: actualizarProducto
      tags:
        - Productos
      parameters:
        - $ref: "#/components/parameters/ProductoId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductoCrear"
      responses:
        "200":
          description: Producto actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Producto"
        "404":
          description: Producto no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Error de validación en los datos del producto
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidacionErrores"

    delete:
      summary: Eliminar producto
      description: Elimina un producto del sistema de forma permanente.
      operationId: eliminarProducto
      tags:
        - Productos
      parameters:
        - $ref: "#/components/parameters/ProductoId"
      responses:
        "204":
          description: Producto eliminado exitosamente
        "404":
          description: Producto no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  parameters:
    MarcaId:
      name: marca_id
      in: path
      required: true
      description: UUID de la marca
      schema:
        type: string
        format: uuid
        example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"

    MateriaPrimaId:
      name: materia_prima_id
      in: path
      required: true
      description: UUID de la materia prima
      schema:
        type: string
        format: uuid
        example: "b2c3d4e5-f6a7-8901-bcde-f12345678901"

    VariableProductoId:
      name: variable_producto_id
      in: path
      required: true
      description: UUID de la variable de producto
      schema:
        type: string
        format: uuid
        example: "c3d4e5f6-a7b8-9012-cdef-123456789012"

    ProductoId:
      name: producto_id
      in: path
      required: true
      description: UUID del producto
      schema:
        type: string
        format: uuid
        example: "d4e5f6a7-b8c9-0123-defa-234567890123"

  schemas:
    Marca:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
          description: Identificador único de la marca
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        name:
          type: string
          description: Nombre de la marca
          example: "L'Oréal"

    MarcaCrear:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Nombre de la marca (debe ser único, case-insensitive)
          maxLength: 100
          example: "L'Oréal"

    MateriaPrima:
      type: object
      required:
        - id
        - name
        - type
      properties:
        id:
          type: string
          format: uuid
          description: Identificador único de la materia prima
        name:
          type: string
          description: Nombre de la materia prima
          example: "Alcohol cetílico"
        type:
          type: string
          enum:
            - chemical
            - packaging
          description: Tipo de materia prima
          example: "chemical"

    MateriaPrimaCrear:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
          description: Nombre de la materia prima (único)
          maxLength: 100
          example: "Alcohol cetílico"
        type:
          type: string
          enum:
            - chemical
            - packaging
          description: Tipo de materia prima
          example: "chemical"

    VariableProducto:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
          description: Identificador único de la variable
        name:
          type: string
          pattern: "^[a-zA-Z_][a-zA-Z0-9_]*$"
          description: |
            Nombre de la variable usado como referencia en fórmulas.
            Solo letras, números y guiones bajos. No espacios ni caracteres especiales.
          example: "peso_neto"

    VariableProductoCrear:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          pattern: "^[a-zA-Z_][a-zA-Z0-9_]*$"
          description: |
            Nombre de la variable (identificador válido, único).
            Debe coincidir con el patrón: solo letras, números y guion bajo.
          example: "peso_neto"

    ProductoRawMaterial:
      type: object
      required:
        - raw_material_id
        - formula
      properties:
        raw_material_id:
          type: string
          format: uuid
          description: UUID de la materia prima asociada
          example: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
        formula:
          type: string
          description: |
            Expresión matemática que define la cantidad de la materia prima.
            Puede usar operadores (+, -, *, /, ^), paréntesis, números y
            referencias a variables globales registradas.
          example: "peso_neto * 0.05 + volumen / 2"

    Producto:
      type: object
      required:
        - id
        - name
        - code
        - brand_id
        - raw_materials
      properties:
        id:
          type: string
          format: uuid
          description: Identificador único del producto
        name:
          type: string
          description: Nombre del producto
          example: "Crema hidratante facial"
        code:
          type: string
          description: Código alfanumérico del producto (definido por el usuario)
          example: "CHF-001"
        brand_id:
          type: string
          format: uuid
          description: UUID de la marca asociada
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        raw_materials:
          type: array
          description: Lista de materias primas con sus fórmulas
          items:
            $ref: "#/components/schemas/ProductoRawMaterial"

    ProductoLista:
      type: object
      required:
        - id
        - name
        - code
        - brand_id
        - nombre_marca
        - cantidad_materias_primas
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "Crema hidratante facial"
        code:
          type: string
          example: "CHF-001"
        brand_id:
          type: string
          format: uuid
        nombre_marca:
          type: string
          description: Nombre de la marca asociada (join con la entidad marca)
          example: "L'Oréal"
        cantidad_materias_primas:
          type: integer
          description: Cantidad de materias primas asociadas al producto
          example: 3

    ProductoDetalle:
      allOf:
        - $ref: "#/components/schemas/Producto"
        - type: object
          properties:
            nombre_marca:
              type: string
              description: Nombre de la marca (expandido)
            materias_primas_detalle:
              type: array
              description: Materias primas con información expandida
              items:
                type: object
                properties:
                  materia_prima_id:
                    type: string
                    format: uuid
                  nombre_materia_prima:
                    type: string
                    example: "Alcohol cetílico"
                  tipo:
                    type: string
                    enum:
                      - chemical
                      - packaging
                  formula:
                    type: string
                  formula_valida:
                    type: boolean
                    description: Indica si la fórmula es matemáticamente válida
                  variables_usadas:
                    type: array
                    description: Lista de variables globales usadas en la fórmula
                    items:
                      type: string
                      example: "peso_neto"

    ProductoCrear:
      type: object
      required:
        - name
        - code
        - brand_id
        - raw_materials
      properties:
        name:
          type: string
          maxLength: 100
          example: "Crema hidratante facial"
        code:
          type: string
          maxLength: 50
          description: Código alfanumérico único del producto
          example: "CHF-001"
        brand_id:
          type: string
          format: uuid
          description: UUID de la marca (debe existir)
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        raw_materials:
          type: array
          minItems: 1
          description: Lista de materias primas (sin duplicados de materia prima)
          items:
            $ref: "#/components/schemas/ProductoRawMaterialCrear"

    ProductoRawMaterialCrear:
      type: object
      required:
        - raw_material_id
        - formula
      properties:
        raw_material_id:
          type: string
          format: uuid
          description: UUID de la materia prima (debe existir y no estar duplicada en la lista)
        formula:
          type: string
          description: |
            Expresión matemática válida. Puede contener números, operadores
            (+, -, *, /, ^), paréntesis y referencias a variables globales.
            Se valida con mathjs.

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Mensaje de error descriptivo
          example: "Recurso no encontrado"

    ValidacionErrores:
      type: object
      required:
        - errores
      properties:
        errores:
          type: object
          description: Mapa de errores de validación campo por campo
          additionalProperties:
            type: string
            description: Mensaje de error para cada campo
          example:
            name: "El nombre es requerido"
            "raw_materials.0.formula": "Expresión matemática inválida: Variable 'peso' no definida"
